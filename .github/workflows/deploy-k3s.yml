name: Deploy OTP Relay to K3s

on:
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: "Deployment mode override"
        required: true
        default: auto
        type: choice
        options:
          - auto
          - full
          - app
          - monitor
          - manifests
          - none

      service_type:
        description: "Kubernetes app service exposure. Official production path is ClusterIP behind Traefik Ingress."
        required: true
        default: ClusterIP
        type: choice
        options:
          - ClusterIP
          - NodePort
          - LoadBalancer

      ingress_enabled:
        description: "Enable Traefik ingress"
        required: true
        default: "1"
        type: choice
        options:
          - "1"
          - "0"

      tls_enabled:
        description: "Enable HTTPS/TLS on Traefik Ingress"
        required: true
        default: "1"
        type: choice
        options:
          - "0"
          - "1"

      tls_host:
        description: "HTTPS hostname for OTP Relay Ingress"
        required: true
        default: "srvotptest26.init-db.lan"
        type: string

      tls_secret_name:
        description: "Kubernetes TLS secret name for OTP Relay Ingress"
        required: true
        default: "otp-relay-tls"
        type: string

      tls_self_signed:
        description: "Generate/update a self-signed TLS certificate in the installer. IT should distribute/trust it by Group Policy."
        required: true
        default: "1"
        type: choice
        options:
          - "0"
          - "1"

      install_metallb:
        description: "Install/configure MetalLB before deploying"
        required: true
        default: "0"
        type: choice
        options:
          - "0"
          - "1"

      require_metallb:
        description: "Fail if LoadBalancer mode cannot find MetalLB"
        required: true
        default: "0"
        type: choice
        options:
          - "0"
          - "1"

      loadbalancer_ip:
        description: "Optional fixed app LoadBalancer IP. Not used for official ClusterIP + Ingress mode."
        required: false
        default: ""
        type: string

      metallb_ip_range:
        description: "MetalLB IP pool, for example 172.31.11.120-172.31.11.130"
        required: false
        default: ""
        type: string

      replica_count:
        description: "OTP Relay app replica count"
        required: true
        default: "2"
        type: choice
        options:
          - "1"
          - "2"
          - "3"

      pvc_storage_class:
        description: "App PVC storageClassName; use otp-relay-nfs when NFS is enabled"
        required: false
        default: "otp-relay-nfs"
        type: string

      pvc_size:
        description: "App PVC size"
        required: true
        default: 1Gi
        type: string

      nfs_enabled:
        description: "Use a static NFS PersistentVolume for app data"
        required: true
        default: "1"
        type: choice
        options:
          - "0"
          - "1"

      nfs_server:
        description: "NFS server IP or DNS name for app data; required when nfs_enabled=1"
        required: false
        default: "172.31.11.108"
        type: string

      nfs_path:
        description: "NFS export path for app data; required when nfs_enabled=1"
        required: false
        default: "/export/otp-relay-data"
        type: string

      redis_enabled:
        description: "Deploy Redis shared-state service"
        required: true
        default: "1"
        type: choice
        options:
          - "0"
          - "1"

      redis_required:
        description: "Fail readiness if Redis is not reachable"
        required: true
        default: "1"
        type: choice
        options:
          - "0"
          - "1"

      redis_storage_class:
        description: "Redis PVC storageClassName"
        required: false
        default: "local-path"
        type: string

      redis_size:
        description: "Redis PVC size"
        required: true
        default: 1Gi
        type: string

  push:
    branches:
      - main

concurrency:
  group: otp-relay-k3s-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy on K3s server
    runs-on:
      - self-hosted
      - Linux
      - X64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine deployment mode
        id: deploy_mode
        shell: bash
        run: |
          set -euo pipefail

          REQUESTED_MODE="${{ github.event.inputs.deploy_mode || 'auto' }}"
          if [ "$REQUESTED_MODE" != "auto" ]; then
            echo "mode=$REQUESTED_MODE" >> "$GITHUB_OUTPUT"
            echo "Deployment mode override: $REQUESTED_MODE"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
            echo "Manual run with auto mode defaults to full deployment."
            exit 0
          fi

          BASE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.sha }}"

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
            echo "No usable base SHA found; using full deployment."
            exit 0
          fi

          CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          echo "Changed files:"
          printf '%s\n' "$CHANGED_FILES"

          if [ -z "$CHANGED_FILES" ]; then
            echo "mode=none" >> "$GITHUB_OUTPUT"
            echo "No changed files detected."
            exit 0
          fi

          APP_CHANGED=0
          MONITOR_CHANGED=0
          MANIFESTS_CHANGED=0
          DOCS_ONLY_CHANGED=0
          UNKNOWN_CHANGED=0

          while IFS= read -r file; do
            [ -n "$file" ] || continue

            case "$file" in
              install-otp-relay-k8s.sh)
                MANIFESTS_CHANGED=1
                ;;

              .github/workflows/deploy-k3s.yml)
                MANIFESTS_CHANGED=1
                ;;

              package.json|package-lock.json|.dockerignore)
                APP_CHANGED=1
                ;;

              main.py|requirements.txt|frontend/*|frontend/**|scripts/build_help_docs.py|docs/help/*|docs/help/**)
                APP_CHANGED=1
                ;;

              monitor.py)
                MONITOR_CHANGED=1
                ;;

              k8s/Dockerfile)
                APP_CHANGED=1
                ;;

              k8s/Dockerfile.monitor)
                MONITOR_CHANGED=1
                ;;

              k8s/manifests/*|k8s/manifests/**)
                MANIFESTS_CHANGED=1
                ;;

              k8s/observability/*|k8s/observability/**)
                MANIFESTS_CHANGED=1
                ;;

              README.md|LICENSE|.gitignore|docs/*|docs/**|scripts/generate_sample_users.py)
                DOCS_ONLY_CHANGED=1
                ;;

              *)
                UNKNOWN_CHANGED=1
                ;;
            esac
          done <<< "$CHANGED_FILES"

          if [ "$UNKNOWN_CHANGED" = "1" ]; then
            MODE=full
          elif [ "$APP_CHANGED" = "1" ] && [ "$MONITOR_CHANGED" = "1" ]; then
            MODE=full
          elif [ "$APP_CHANGED" = "1" ]; then
            MODE=app
          elif [ "$MONITOR_CHANGED" = "1" ]; then
            MODE=monitor
          elif [ "$MANIFESTS_CHANGED" = "1" ]; then
            MODE=manifests
          elif [ "$DOCS_ONLY_CHANGED" = "1" ]; then
            MODE=none
          else
            MODE=none
          fi

          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Selected deployment mode: $MODE"

      - name: Skip deployment
        if: steps.deploy_mode.outputs.mode == 'none'
        run: echo "No deployment needed for the changed files."

      - name: Deploy with checked-out installer
        if: steps.deploy_mode.outputs.mode != 'none'
        env:
          DEPLOY_MODE: ${{ steps.deploy_mode.outputs.mode }}
          REPO_URL: https://github.com/psi1703/k8s.git
          REPO_REF: main
          INSTALL_DIR: /opt/otp-relay-k8s
          NAMESPACE: otp-relay
          APP_IMAGE: otp-relay:latest
          MONITOR_IMAGE: otp-monitor:latest

          # Official exposure model:
          # Client -> Traefik HTTPS Ingress -> otp-relay ClusterIP Service -> app pods.
          SERVICE_TYPE: ${{ github.event.inputs.service_type || 'ClusterIP' }}
          SERVICE_NODE_PORT: "30080"
          INGRESS_ENABLED: ${{ github.event.inputs.ingress_enabled || '1' }}
          TLS_ENABLED: ${{ github.event.inputs.tls_enabled || '1' }}
          TLS_HOST: ${{ github.event.inputs.tls_host || 'srvotptest26.init-db.lan' }}
          TLS_SECRET_NAME: ${{ github.event.inputs.tls_secret_name || 'otp-relay-tls' }}
          TLS_SELF_SIGNED: ${{ github.event.inputs.tls_self_signed || '1' }}
          LOADBALANCER_IP: ${{ github.event.inputs.loadbalancer_ip || '' }}
          INSTALL_METALLB: ${{ github.event.inputs.install_metallb || '0' }}
          REQUIRE_METALLB: ${{ github.event.inputs.require_metallb || '0' }}
          METALLB_IP_RANGE: ${{ github.event.inputs.metallb_ip_range || '' }}

          REPLICA_COUNT: ${{ github.event.inputs.replica_count || '2' }}
          APP_NODE_SELECTOR_KEY: otp-relay/storage-node
          APP_NODE_SELECTOR_VALUE: "true"
          MONITOR_NODE_SELECTOR_KEY: otp-relay/monitor-node
          MONITOR_NODE_SELECTOR_VALUE: "true"
          REDIS_NODE_SELECTOR_KEY: otp-relay/storage-node
          REDIS_NODE_SELECTOR_VALUE: "true"

          PVC_STORAGE_CLASS: ${{ github.event.inputs.pvc_storage_class || 'otp-relay-nfs' }}
          PVC_SIZE: ${{ github.event.inputs.pvc_size || '1Gi' }}

          # SCH Phase 3 storage posture: push deployments use the dedicated NFS VM automatically.
          # Manual workflow dispatch can still override these values if needed.
          NFS_ENABLED: ${{ github.event.inputs.nfs_enabled || '1' }}
          NFS_SERVER: ${{ github.event.inputs.nfs_server || secrets.NFS_SERVER || '172.31.11.108' }}
          NFS_PATH: ${{ github.event.inputs.nfs_path || secrets.NFS_PATH || '/export/otp-relay-data' }}
          NFS_STORAGE_CLASS: otp-relay-nfs
          NFS_PV_NAME: otp-relay-data-nfs-pv
          NFS_MOUNT_OPTIONS: nfsvers=4.1

          REDIS_ENABLED: ${{ github.event.inputs.redis_enabled || '1' }}
          REDIS_URL: redis://otp-redis-haproxy:6379/0
          REDIS_REQUIRED: ${{ github.event.inputs.redis_required || '1' }}
          REDIS_STORAGE_CLASS: ${{ github.event.inputs.redis_storage_class || 'local-path' }}
          REDIS_SIZE: ${{ github.event.inputs.redis_size || '1Gi' }}

          NONINTERACTIVE: "1"
          GIT_CLEAN: "1"
          PHONE_IP: ${{ secrets.PHONE_IP }}
          PHONE_INTERFACE: ${{ secrets.PHONE_INTERFACE }}
          WHATSAPP_API_KEY: ${{ secrets.WHATSAPP_API_KEY }}
          WHATSAPP_RECIPIENT: ${{ secrets.WHATSAPP_RECIPIENT }}
          PORTAL_URL: ${{ secrets.PORTAL_URL || 'https://srvotptest26.init-db.lan' }}
        run: |
          sudo -n -E /usr/bin/bash "$GITHUB_WORKSPACE/install-otp-relay-k8s.sh"
