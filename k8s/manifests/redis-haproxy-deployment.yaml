apiVersion: apps/v1
kind: Deployment
metadata:
  name: otp-redis-haproxy
  namespace: otp-relay
  labels:
    app: otp-redis-haproxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: otp-redis-haproxy
  template:
    metadata:
      labels:
        app: otp-redis-haproxy
    spec:
      containers:
        - name: haproxy
          image: haproxy:2.9-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
              name: redis
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 150m
              memory: 128Mi
          volumeMounts:
            - name: haproxy-config
              mountPath: /usr/local/etc/haproxy
      volumes:
        - name: haproxy-config
          configMap:
            name: otp-redis-haproxy-config
