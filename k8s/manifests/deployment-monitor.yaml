apiVersion: apps/v1
kind: Deployment
metadata:
  name: otp-monitor
  namespace: otp-relay
  labels:
    app: otp-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otp-monitor
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: otp-monitor
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999

      containers:
        - name: monitor
          image: otp-monitor:latest
          imagePullPolicy: IfNotPresent

          envFrom:
            - configMapRef:
                name: otp-relay-config

          env:
            - name: OTP_RELAY_DATA_DIR
              value: /app/data
            - name: WHATSAPP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: otp-relay-secrets
                  key: WHATSAPP_API_KEY
            - name: WHATSAPP_RECIPIENT
              valueFrom:
                secretKeyRef:
                  name: otp-relay-secrets
                  key: WHATSAPP_RECIPIENT

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_RAW

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

          volumeMounts:
            - name: data
              mountPath: /app/data

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: otp-relay-data
