apiVersion: apps/v1
kind: Deployment
metadata:
  name: otp-relay
  namespace: otp-relay
  labels:
    app: otp-relay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otp-relay
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: otp-relay
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999

      containers:
        - name: app
          image: otp-relay:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000

          # ── Environment: non-secret config from ConfigMap ──────────────────
          envFrom:
            - configMapRef:
                name: otp-relay-config

          # ── Environment: secrets ───────────────────────────────────────────
          env:
            - name: SMS_SECRET_TOKEN
              valueFrom:
                secretKeyRef:
                  name: otp-relay-secrets
                  key: SMS_SECRET_TOKEN

          # ── Resource limits ────────────────────────────────────────────────
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi

          # ── Probes ─────────────────────────────────────────────────────────
          readinessProbe:
            httpGet:
              path: /admin/queue
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /admin/queue
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3

          # ── Volume mount ───────────────────────────────────────────────────
          volumeMounts:
            - name: data
              mountPath: /app/data

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: otp-relay-data
