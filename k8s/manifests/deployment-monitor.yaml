apiVersion: apps/v1
kind: Deployment
metadata:
  name: otp-monitor
  namespace: otp-relay
  labels:
    app: otp-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otp-monitor
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: otp-monitor
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999

      containers:
        - name: monitor
          image: otp-monitor:latest
          imagePullPolicy: IfNotPresent

          # ── Environment: non-secret config from ConfigMap ────────────────
          envFrom:
            - configMapRef:
                name: otp-relay-config

          # ── Environment: secrets ─────────────────────────────────────────
          env:
            - name: WHATSAPP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: otp-relay-secrets
                  key: WHATSAPP_API_KEY
            - name: WHATSAPP_RECIPIENT
              valueFrom:
                secretKeyRef:
                  name: otp-relay-secrets
                  key: WHATSAPP_RECIPIENT

          # ── CAP_NET_RAW — required for arping ────────────────────────────
          # arping sends raw ARP packets which requires this capability.
          # We add only this capability and drop all others for least privilege.
          securityContext:
            capabilities:
              add: ["NET_RAW"]
              drop: ["ALL"]

          # ── Resource limits ──────────────────────────────────────────────
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

          # ── Volume mount — shares PVC with the app pod ───────────────────
          # The monitor reads and writes the audit log at /app/data/audit.log.
          # This is the same PVC mounted by the app pod, so both services
          # share a single audit log file on the same node.
          volumeMounts:
            - name: data
              mountPath: /app/data

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: otp-relay-data
